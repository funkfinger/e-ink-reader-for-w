[env:wireless_paper]
platform = espressif32
board = heltec_wifi_lora_32_V3  ; Use V3 as base
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags for Wireless Paper
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CONFIG_USB_OTG_SUPPORTED=1
    -D ARDUINO_HELTEC_WIRELESS_PAPER
    -D WIRELESS_PAPER

; LittleFS filesystem
board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv

; E-Ink display library
lib_deps =
    https://github.com/todd-herbert/heltec-eink-modules
